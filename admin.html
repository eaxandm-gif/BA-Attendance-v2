<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BA Attendance Admin</title><script src="assets/config.js"></script><style>body{margin:0;font-family:Arial,sans-serif;background:#fff5fa;color:#4a2438}header{background:linear-gradient(135deg,#f9a8d4,#ec4899);color:#fff;padding:20px}main{max-width:1200px;margin:auto;padding:18px}.card{background:#fff;border-radius:18px;padding:16px;box-shadow:0 8px 22px #db277722;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}button{border:0;border-radius:12px;padding:11px 14px;background:#db2777;color:#fff;font-weight:700}input,select,textarea{padding:10px;border:1px solid #fbcfe8;border-radius:10px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:9px;border-bottom:1px solid #fce7f3;text-align:left}.muted{color:#8b5f74}.hidden{display:none}</style></head><body><header><h2 style="margin:0">BA Attendance Desktop Admin</h2><div>Supabase Edition v2.0.0</div></header><main><div id="login" class="card"><h3>เข้าสู่ระบบ Admin</h3><p class="muted">ใส่ Admin API Key ที่ตั้งใน Supabase Edge Function Secret</p><input id="key" type="password" placeholder="Admin API Key"><button onclick="login()">เข้าสู่ระบบ</button></div><div id="app" class="hidden"><div class="grid"><button onclick="loadEmployees()">Employees</button><button onclick="loadOffices()">Offices</button><button onclick="loadSupervisors()">Supervisors</button><button onclick="loadAudit()">Audit Log</button><button onclick="syncNow()">Sync Google Sheets</button></div><div id="content" class="card" style="margin-top:14px"></div></div></main><script>
let adminKey='',employees=[],offices=[],supervisors=[];const $=x=>document.getElementById(x);async function api(action,payload={}){const r=await fetch(BA_CONFIG.EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':adminKey},body:JSON.stringify({action,payload})});const d=await r.json();if(!r.ok||d.success===false)throw new Error(d.message||'Error');return d}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function login(){adminKey=$('key').value.trim();sessionStorage.setItem('ba_admin_key',adminKey);api('admin_bootstrap').then(()=>{$('login').classList.add('hidden');$('app').classList.remove('hidden');loadEmployees()}).catch(e=>alert(e.message))}
async function refs(){if(!offices.length)offices=(await api('admin_list_offices')).rows;if(!supervisors.length)supervisors=(await api('admin_list_supervisors')).rows}
async function loadEmployees(){await refs();employees=(await api('admin_list_employees')).rows;$('content').innerHTML=`<h3>Employees</h3><div style="overflow:auto"><table><tr><th>รหัส</th><th>ชื่อ</th><th>โทร</th><th>Mode</th><th>สาขา</th><th>Supervisor</th><th>ครบ</th><th></th></tr>${employees.map((e,i)=>`<tr><td>${esc(e.employee_code)}</td><td>${esc(e.display_name)}</td><td>${esc(e.phone||'')}</td><td>${esc(e.ba_mode||'')}</td><td>${esc(e.offices?.office_name||'')}</td><td>${esc(e.supervisors?.supervisor_name||'')}</td><td>${e.profile_completed?'✓':'⚠️'}</td><td><button onclick="editEmployee(${i})">แก้</button></td></tr>`).join('')}</table></div>`}
function editEmployee(i){const e=employees[i],mode=prompt('BA Mode: FIXED_BRANCH / MULTI_BRANCH / STOCK_REFILL',e.ba_mode||'')||e.ba_mode;const phone=prompt('เบอร์โทร',e.phone||'')??e.phone;const line=prompt('LINE User ID',e.line_user_id||'')??e.line_user_id;const officeCode=prompt('Office Code เช่น OFBA01',offices.find(o=>o.id===e.assigned_office_id)?.office_code||'');const supCode=prompt('Supervisor Code เช่น SUP001',supervisors.find(x=>x.id===e.supervisor_id)?.supervisor_code||'');const reason=prompt('เหตุผลการแก้ไข')||'Desktop Admin';const o=offices.find(x=>x.office_code===officeCode),sp=supervisors.find(x=>x.supervisor_code===supCode);api('admin_update_employee',{id:e.id,display_name:e.display_name,full_name:e.full_name,phone,line_user_id:line,ba_mode:mode,assigned_office_id:o?.id||null,supervisor_id:sp?.id||null,active:e.active,reason}).then(loadEmployees).catch(x=>alert(x.message))}
async function loadOffices(){offices=(await api('admin_list_offices')).rows;$('content').innerHTML=`<h3>Offices</h3><div style="overflow:auto"><table><tr><th>Code</th><th>สาขา</th><th>Region</th><th>GPS</th><th>Radius</th><th></th></tr>${offices.map((o,i)=>`<tr><td>${esc(o.office_code)}</td><td>${esc(o.office_name)}</td><td>${esc(o.region)}</td><td>${o.latitude}, ${o.longitude}</td><td>${o.radius_meters}</td><td><button onclick="editOffice(${i})">แก้</button></td></tr>`).join('')}</table></div>`}function editOffice(i){const o=offices[i],radius=prompt('GPS Radius (เมตร)',o.radius_meters);const region=prompt('Region',o.region);const reason=prompt('เหตุผล')||'Desktop Admin';api('admin_update_office',{...o,radius_meters:Number(radius),region,reason}).then(loadOffices).catch(e=>alert(e.message))}
async function loadSupervisors(){supervisors=(await api('admin_list_supervisors')).rows;$('content').innerHTML=`<h3>Supervisors</h3><div style="overflow:auto"><table><tr><th>Code</th><th>ชื่อ</th><th>โทร</th><th>LINE User ID</th><th></th></tr>${supervisors.map((x,i)=>`<tr><td>${esc(x.supervisor_code)}</td><td>${esc(x.supervisor_name)}</td><td>${esc(x.phone||'')}</td><td>${esc(x.line_user_id||'')}</td><td><button onclick="editSupervisor(${i})">แก้</button></td></tr>`).join('')}</table></div>`}function editSupervisor(i){const x=supervisors[i],phone=prompt('เบอร์โทร',x.phone||'')??x.phone,line=prompt('LINE User ID',x.line_user_id||'')??x.line_user_id,reason=prompt('เหตุผล')||'Desktop Admin';api('admin_update_supervisor',{id:x.id,supervisor_name:x.supervisor_name,phone,line_user_id:line,active:x.active,reason}).then(loadSupervisors).catch(e=>alert(e.message))}
async function loadAudit(){const rows=(await api('admin_audit')).rows;$('content').innerHTML=`<h3>Audit Log</h3><div style="overflow:auto"><table><tr><th>เวลา</th><th>Role</th><th>Action</th><th>Entity</th><th>เหตุผล</th></tr>${rows.map(x=>`<tr><td>${esc(x.created_at)}</td><td>${esc(x.actor_role)}</td><td>${esc(x.action)}</td><td>${esc(x.entity_type)} ${esc(x.entity_id||'')}</td><td>${esc(x.reason||'')}</td></tr>`).join('')}</table></div>`}async function syncNow(){alert((await api('admin_sync_now')).message)}window.addEventListener('load',()=>{const k=sessionStorage.getItem('ba_admin_key');if(k){$('key').value=k;login()}})
</script></body></html>
