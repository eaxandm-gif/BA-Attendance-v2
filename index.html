<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BA Attendance</title><script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script><script src="config.js?v=2.3.1"></script><script src="api.js?v=2.3.1"></script><style>
:root{--pink:#f9a8d4;--deep:#db2777;--soft:#fff1f7;--card:#fff;--text:#4a2438;--muted:#8b5f74;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans Thai",sans-serif;background:linear-gradient(180deg,#ffe4f0,#fff7fb);color:var(--text)}header{padding:24px 18px 38px;background:linear-gradient(135deg,#f9a8d4,#f472b6);color:white;text-align:center}.wrap{max-width:560px;margin:-24px auto 40px;padding:0 13px}.card{background:#fff;border-radius:22px;padding:16px;box-shadow:0 12px 30px rgba(219,39,119,.14);margin-bottom:13px}.hidden{display:none!important}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}button{border:0;border-radius:15px;padding:14px 10px;font-weight:700;font-size:15px;cursor:pointer;background:#fce7f3;color:#9d174d}button.primary{background:#db2777;color:white}button.green{background:#dcfce7;color:#166534}button.orange{background:#ffedd5;color:#9a3412}button.red{background:#fee2e2;color:#991b1b}button.purple{background:#f3e8ff;color:#6b21a8}button.full{width:100%}.muted{color:var(--muted);font-size:13px}.title{font-size:18px;font-weight:800;margin-bottom:10px}.status{white-space:pre-line;line-height:1.5}.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.tabs button{white-space:nowrap;padding:10px 12px}.list{display:grid;gap:9px}.item{padding:12px;border-radius:15px;background:#fff7fb;border:1px solid #fbcfe8}.row{display:flex;justify-content:space-between;gap:8px;align-items:center}.badge{padding:4px 9px;border-radius:999px;background:#fce7f3;font-size:12px}.field{margin-bottom:10px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.field input,.field select,.field textarea{width:100%;padding:11px;border:1px solid #fbcfe8;border-radius:12px;background:white}.modal{position:fixed;inset:0;background:#0006;display:none;align-items:flex-end;z-index:20}.modal.show{display:flex}.sheet{background:#fff;width:100%;max-height:92vh;overflow:auto;border-radius:24px 24px 0 0;padding:18px}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.kpi{background:#fff7fb;border-radius:15px;padding:12px}.kpi strong{display:block;font-size:23px;color:#be185d}.error{color:#991b1b;background:#fee2e2}.success{color:#166534;background:#dcfce7}
</style></head><body><header><h1 style="margin:0">BA Attendance</h1><div>ระบบลงเวลาและดูแลทีม</div></header><main class="wrap"><div id="loading" class="card status">กำลังเข้าสู่ระบบ LINE...</div><section id="portal" class="hidden"><div class="card"><div class="row"><div><div id="name" class="title"></div><div id="role" class="muted"></div></div><span id="version" class="badge"></span></div></div><div id="employeeView" class="hidden"></div><div id="supervisorView" class="hidden"></div></section></main><div id="modal" class="modal"><div class="sheet"><div id="modalBody"></div><button class="full" onclick="closeModal()">ปิด</button></div></div>
<script>
const $=x=>document.getElementById(x); let session=null;
const actions={IN:'เข้างาน',OUT:'ออกงาน',BREAK_OUT:'ออกพัก',BREAK_IN:'กลับจากพัก',DAY_IN:'เริ่มวัน',DAY_OUT:'จบวัน',BRANCH_IN:'เข้าสาขา',BRANCH_OUT:'ออกสาขา',WORK_IN:'เข้างาน',WORK_OUT:'ออกงาน',REFILL_IN:'เข้าเติมของ',REFILL_OUT:'ออกจากเติมของ'};
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function hm(m){m=Math.round(Number(m||0));return `${Math.floor(m/60)} ชม. ${m%60} นาที`}function notice(t,c=''){$('loading').className='card status '+c;$('loading').textContent=t;$('loading').classList.remove('hidden')}
async function init(){let profile=null;try{await liff.init({liffId:BA_CONFIG.LIFF_ID});if(!liff.isLoggedIn()){liff.login();return}profile=await liff.getProfile();alert('LINE User ID ของคุณคือ:\n' + profile.userId);session=await BA_API.request('bootstrap');$('loading').classList.add('hidden');$('portal').classList.remove('hidden');$('name').textContent=session.profile.name;$('role').textContent=session.profile.role==='SUPERVISOR'?'Supervisor':'BA';$('version').textContent='v'+BA_CONFIG.VERSION;if(session.profile.role==='SUPERVISOR')renderSupervisorHome();else renderEmployeeHome()}catch(e){const uid=profile?.userId?`\n\nLINE User ID:\n${profile.userId}`:'';notice(e.message+uid,'error')}}
async function renderEmployeeHome(){const r=await BA_API.request('employee_home');$('employeeView').classList.remove('hidden');$('employeeView').innerHTML=`<div class="card"><div class="title">วันนี้</div><div class="status">สถานะ: ${esc(r.state.label)}\nสาขา: ${esc(r.state.office_name||'-')}</div><div class="grid" id="actionGrid"></div></div><div class="card"><div class="grid"><button onclick="showMyHistory()">ประวัติของฉัน</button><button onclick="showLeaveForm()">ยื่นลา</button></div></div>`;const g=$('actionGrid');r.allowed_actions.forEach(a=>{const b=document.createElement('button');b.className=a.includes('OUT')?'orange':'primary';b.textContent=actions[a]||a;b.onclick=()=>submitAttendance(a);g.appendChild(b)})}
function submitAttendance(type){navigator.geolocation.getCurrentPosition(async p=>{try{await BA_API.request('submit_attendance',{type,latitude:p.coords.latitude,longitude:p.coords.longitude,accuracy:p.coords.accuracy});await renderEmployeeHome()}catch(e){alert(e.message)}},e=>alert('กรุณาอนุญาต Location'),{enableHighAccuracy:true,timeout:12000})}
async function showMyHistory(){const r=await BA_API.request('my_history',{month:new Date().toISOString().slice(0,7)});openModal(`<div class="title">ประวัติของฉัน</div><div class="list">${r.rows.map(x=>`<div class="item"><b>${esc(x.work_date)}</b><div>${esc(x.status)} · ${hm(x.credited_minutes)}</div><div class="muted">${esc((x.branch_names||[]).join(', '))}</div></div>`).join('')||'ยังไม่มีข้อมูล'}</div>`)}
function showLeaveForm(){openModal(`<div class="title">ยื่นคำขอลา</div><div class="field"><label>วันที่</label><input id="lvDate" type="date"></div><div class="field"><label>ประเภท</label><select id="lvType"><option value="SICK_LEAVE">ลาป่วย</option><option value="BUSINESS_LEAVE">ลากิจ</option><option value="VACATION">ลาพักร้อน</option></select></div><div class="field"><label>เหตุผล</label><textarea id="lvReason"></textarea></div><button class="primary full" onclick="submitLeave()">ส่งคำขอ</button>`)}async function submitLeave(){try{await BA_API.request('submit_leave',{leave_date:$('lvDate').value,leave_type:$('lvType').value,reason:$('lvReason').value});closeModal();alert('ส่งคำขอแล้ว')}catch(e){alert(e.message)}}
async function renderSupervisorHome(){const r=await BA_API.request('supervisor_dashboard');$('supervisorView').classList.remove('hidden');$('supervisorView').innerHTML=`<div class="card"><div class="title">ภาพรวมทีมวันนี้</div><div class="kpis"><div class="kpi">เข้างาน<strong>${r.kpis.working}</strong></div><div class="kpi">ยังไม่เข้างาน<strong>${r.kpis.not_started}</strong></div><div class="kpi">ลา<strong>${r.kpis.leave}</strong></div><div class="kpi">ข้อมูลไม่ครบ<strong>${r.kpis.incomplete}</strong></div></div></div><div class="card"><div class="grid"><button onclick="showTeam()">ทีมของฉัน</button><button onclick="showPendingLeaves()">อนุมัติการลา</button><button onclick="showDaily()">สรุปรายวัน</button><button onclick="showMonthly()">สรุปรายเดือน</button></div></div>`}
async function showTeam(){const r=await BA_API.request('team_list');openModal(`<div class="title">ทีมของฉัน</div><div class="list">${r.rows.map(x=>`<div class="item"><div class="row"><div><b>${esc(x.employee_code)} · ${esc(x.display_name)}</b><div class="muted">${esc(x.phone||'ยังไม่มีเบอร์')} · ${esc(x.office_name||'ยังไม่มีสาขา')} · ${esc(x.region||'-')}</div></div><button onclick="editEmployee('${x.id}')">แก้ไข</button></div></div>`).join('')}</div>`)}
async function editEmployee(id){const r=await BA_API.request('team_employee',{employee_id:id});const e=r.employee;openModal(`<div class="title">แก้ข้อมูล ${esc(e.display_name)}</div><div class="field"><label>ชื่อ</label><input id="eName" value="${esc(e.display_name)}"></div><div class="field"><label>เบอร์โทร</label><input id="ePhone" value="${esc(e.phone||'')}"></div><div class="field"><label>ประเภท BA</label><select id="eMode">${['FIXED_BRANCH','MULTI_BRANCH','STOCK_REFILL'].map(v=>`<option ${v===e.ba_mode?'selected':''}>${v}</option>`).join('')}</select></div><div class="field"><label>สาขาประจำ</label><select id="eOffice">${r.offices.map(o=>`<option value="${o.id}" ${o.id===e.assigned_office_id?'selected':''}>${esc(o.office_name)} (${esc(o.region)})</option>`).join('')}</select></div><div class="field"><label>เหตุผลการแก้ไข</label><textarea id="eReason"></textarea></div><button class="primary full" onclick="saveEmployee('${id}')">บันทึก</button>`)}async function saveEmployee(id){try{await BA_API.request('update_team_employee',{employee_id:id,display_name:$('eName').value,phone:$('ePhone').value,ba_mode:$('eMode').value,assigned_office_id:$('eOffice').value,reason:$('eReason').value});alert('บันทึกแล้ว');showTeam()}catch(e){alert(e.message)}}
async function showPendingLeaves(){const r=await BA_API.request('pending_leaves');openModal(`<div class="title">คำขอลารออนุมัติ</div><div class="list">${r.rows.map(x=>`<div class="item"><b>${esc(x.employee_name)} · ${esc(x.leave_date)}</b><div>${esc(x.leave_type)} — ${esc(x.reason)}</div><div class="grid"><button class="green" onclick="reviewLeave('${x.id}','APPROVED')">อนุมัติ</button><button class="red" onclick="reviewLeave('${x.id}','REJECTED')">ปฏิเสธ</button></div></div>`).join('')||'ไม่มีรายการรออนุมัติ'}</div>`)}async function reviewLeave(id,status){const note=prompt('หมายเหตุ (ถ้ามี)')||'';await BA_API.request('review_leave',{leave_id:id,status,reviewer_note:note});showPendingLeaves()}
async function showDaily(){const d=new Date().toISOString().slice(0,10);const r=await BA_API.request('team_daily',{date:d});openModal(`<div class="title">สรุปรายวัน ${d}</div><div class="list">${r.rows.map(x=>`<div class="item"><b>${esc(x.employee_code)} · ${esc(x.display_name)}</b><div>${esc(x.status)} · ${hm(x.credited_minutes)}</div><button onclick="editTimeline('${x.employee_id}','${d}')">แก้ Attendance</button></div>`).join('')}</div>`)}
async function editTimeline(emp,date){const r=await BA_API.request('attendance_timeline',{employee_id:emp,date});openModal(`<div class="title">Attendance Timeline</div><div class="list">${r.events.map(e=>`<div class="item"><div class="row"><span>${esc(e.event_type)} · ${esc(e.time)} · ${esc(e.office_name||'-')}</span><span><button onclick="updateEvent('${e.id}','${emp}','${date}','${e.event_type}','${e.time}')">แก้</button> <button onclick="deleteEvent('${e.id}','${emp}','${date}')">ลบ</button></span></div></div>`).join('')}</div><button class="primary full" onclick="addEvent('${emp}','${date}')">เพิ่มรายการ</button>`)}async function updateEvent(id,emp,date,currentType,currentTime){const type=prompt('Type',currentType);const time=prompt('เวลา HH:MM',currentTime);const reason=prompt('เหตุผลการแก้ไข');if(type&&time&&reason){await BA_API.request('update_attendance',{event_id:id,date,time,type,reason});editTimeline(emp,date)}}async function deleteEvent(id,emp,date){const reason=prompt('เหตุผลการลบ');if(!reason)return;await BA_API.request('delete_attendance',{event_id:id,reason});editTimeline(emp,date)}function addEvent(emp,date){const type=prompt('Type เช่น IN, OUT, WORK_IN');const time=prompt('เวลา HH:MM');const reason=prompt('เหตุผล');if(type&&time&&reason)BA_API.request('add_attendance',{employee_id:emp,date,time,type,reason}).then(()=>editTimeline(emp,date)).catch(e=>alert(e.message))}
async function showMonthly(){const m=new Date().toISOString().slice(0,7);const r=await BA_API.request('team_monthly',{month:m});openModal(`<div class="title">สรุปรายเดือน ${m}</div><div class="list">${r.rows.map(x=>`<div class="item"><b>${esc(x.employee_code)} · ${esc(x.display_name)}</b><div>ทำงาน ${hm(x.work_minutes)} · เติมของ ${hm(x.refill_minutes)}</div><div>ขาด ${hm(x.short_minutes)} · เกิน ${hm(x.over_minutes)} · Net ${hm(x.net_minutes)}</div></div>`).join('')}</div>`)}
function openModal(html){$('modalBody').innerHTML=html;$('modal').classList.add('show')}function closeModal(){$('modal').classList.remove('show')}window.addEventListener('load',init)
</script></body></html>
