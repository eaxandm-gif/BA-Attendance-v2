<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BA Attendance</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="config.js?v=2.7.0"></script>
<script src="api.js?v=2.7.0"></script>
<style>
:root{--pink:#db2777;--soft:#fff1f7;--card:#fff;--text:#4a2438;--muted:#8b5f74;--ok:#166534;--warn:#9a3412;--bad:#991b1b}
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans Thai",sans-serif;background:linear-gradient(180deg,#ffe4f0,#fff7fb);color:var(--text)}
header{padding:24px 18px 38px;background:linear-gradient(135deg,#f9a8d4,#f472b6);color:#fff;text-align:center}.wrap{max-width:620px;margin:-24px auto 40px;padding:0 13px}
.card{background:#fff;border-radius:22px;padding:16px;box-shadow:0 12px 30px rgba(219,39,119,.14);margin-bottom:13px}.hidden{display:none!important}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
button{border:0;border-radius:15px;padding:13px 10px;font-weight:700;font-size:14px;cursor:pointer;background:#fce7f3;color:#9d174d}
button.primary{background:var(--pink);color:#fff}button.green{background:#dcfce7;color:var(--ok)}button.orange{background:#ffedd5;color:var(--warn)}button.red{background:#fee2e2;color:var(--bad)}button.full{width:100%}
.title{font-size:18px;font-weight:800;margin-bottom:10px}.muted{color:var(--muted);font-size:12px}.row{display:flex;justify-content:space-between;gap:8px;align-items:center}.badge{padding:4px 9px;border-radius:999px;background:#fce7f3;font-size:12px}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.kpi{background:#fff7fb;border-radius:15px;padding:12px}.kpi strong{display:block;font-size:22px;color:#be185d}
.list{display:grid;gap:9px}.item{padding:12px;border-radius:15px;background:#fff7fb;border:1px solid #fbcfe8}.timeline{display:grid;gap:5px;margin-top:8px}.timeline div{font-size:13px}
.field{margin-bottom:10px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.field input,.field select,.field textarea{width:100%;padding:11px;border:1px solid #fbcfe8;border-radius:12px;background:#fff}
.modal{position:fixed;inset:0;background:#0006;display:none;align-items:flex-end;z-index:20}.modal.show{display:flex}.sheet{background:#fff;width:100%;max-height:94vh;overflow:auto;border-radius:24px 24px 0 0;padding:18px}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{padding:8px 3px;border-radius:10px;text-align:center;border:1px solid #fbcfe8;font-size:11px}.day.work{background:#fce7f3}.day.off{background:#f3f4f6}.day.leave{background:#fef3c7}.day.selected{outline:3px solid #db2777}
.error{color:#991b1b;background:#fee2e2}.status{white-space:pre-line;line-height:1.5}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
@media(max-width:430px){.grid3{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header><h1 style="margin:0">BA Attendance</h1><div>ลงเวลา · Shift · ประวัติ · รายงานทีม</div></header>
<main class="wrap">
<div id="loading" class="card status">กำลังเข้าสู่ระบบ LINE...</div>
<section id="portal" class="hidden">
<div class="card"><div class="row"><div><div id="name" class="title"></div><div id="role" class="muted"></div></div><span id="version" class="badge"></span></div></div>
<div id="employeeView" class="hidden"></div><div id="supervisorView" class="hidden"></div>
</section></main>
<div id="modal" class="modal"><div class="sheet"><div id="modalBody"></div><button class="full" onclick="closeModal()">ปิด</button></div></div>
<script>
const $=id=>document.getElementById(id);let session=null,selectedShiftDates=new Set(),shiftEditorData=null;
const labels={IN:'เข้างาน',OUT:'ออกงาน',BREAK_OUT:'ออกพัก',BREAK_IN:'กลับจากพัก',DAY_IN:'เริ่มวัน',DAY_OUT:'จบวัน',BRANCH_IN:'เข้าสาขา',BRANCH_OUT:'ออกสาขา',WORK_IN:'เข้างาน',WORK_OUT:'ออกงาน',REFILL_IN:'เข้าเติมของ',REFILL_OUT:'ออกจากเติมของ'};
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function hm(m){m=Math.round(Number(m||0));const s=m<0?'-':'';m=Math.abs(m);return `${s}${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`}
function notice(t,c=''){$('loading').className='card status '+c;$('loading').textContent=t;$('loading').classList.remove('hidden')}
function openModal(html){$('modalBody').innerHTML=html;$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show')}
function showModalError(message){openModal(`<div class="title">เกิดข้อผิดพลาด</div><div class="item error">${esc(message)}</div>`)}
function showMonthPicker(title,buttonText,onConfirm){
  openModal(`<div class="title">${esc(title)}</div>
    <div class="field"><label>เลือกเดือน</label><input id="monthPicker" type="month" value="${thaiMonth()}"></div>
    <button class="primary full" id="monthPickerBtn">${esc(buttonText)}</button>`);
  $('monthPickerBtn').onclick=()=>onConfirm($('monthPicker').value);
}
function showLoadingModal(title='กำลังโหลด...'){openModal(`<div class="title">${esc(title)}</div><div class="item">กรุณารอสักครู่</div>`)}

function thaiMonth(){return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Bangkok',year:'numeric',month:'2-digit'}).format(new Date())}
function thaiDate(){return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Bangkok'}).format(new Date())}
async function init(){let p=null;try{await liff.init({liffId:BA_CONFIG.LIFF_ID});if(!liff.isLoggedIn()){liff.login();return}p=await liff.getProfile();session=await BA_API.request('bootstrap');$('loading').classList.add('hidden');$('portal').classList.remove('hidden');$('name').textContent=session.profile.name;$('role').textContent=session.profile.role==='SUPERVISOR'?'Supervisor':'BA';$('version').textContent='v2.7.1';session.profile.role==='SUPERVISOR'?renderSupervisorHome():renderEmployeeHome()}catch(e){notice(e.message+(p?.userId?`\n\nLINE User ID:\n${p.userId}`:''),'error')}}
async function renderEmployeeHome(){const r=await BA_API.request('employee_home');$('employeeView').classList.remove('hidden');$('employeeView').innerHTML=`<div class="card"><div class="title">วันนี้</div><div class="status">สถานะ: ${esc(r.state.label)}\nสาขา: ${esc(r.state.office_name||'-')}\nShift: ${esc(r.shift?.name||'-')} ${r.shift?.start_time?'('+esc(String(r.shift.start_time).slice(0,5))+'–'+esc(String(r.shift.end_time).slice(0,5))+')':''}\nสาย: ${Number(r.shift?.late_minutes||0)} นาที</div><div class="grid" id="actionGrid"></div></div><div class="card"><div class="grid3"><button onclick="showMyHistory()">ประวัติละเอียด</button><button onclick="showMyShift()">Shift ทั้งเดือน</button><button onclick="showMyLeaves()">สถานะการลา</button><button onclick="showMyProfile()">ข้อมูลส่วนตัว</button><button onclick="showLeaveForm()">ยื่นลา</button></div></div>`;const g=$('actionGrid');r.allowed_actions.forEach(a=>{const b=document.createElement('button');b.className=a.includes('OUT')?'orange':'primary';b.textContent=labels[a]||a;b.onclick=()=>submitAttendance(a);g.appendChild(b)})}
function submitAttendance(type){navigator.geolocation.getCurrentPosition(async p=>{try{await BA_API.request('submit_attendance',{type,latitude:p.coords.latitude,longitude:p.coords.longitude,accuracy:p.coords.accuracy});await renderEmployeeHome()}catch(e){alert(e.message)}},()=>alert('กรุณาอนุญาต Location'),{enableHighAccuracy:true,timeout:12000})}
function showMyHistory(){
  showMonthPicker('ประวัติของฉัน','ดูประวัติ',async month=>{
    if(!month)return;
    showLoadingModal('กำลังโหลดประวัติ');
    try{
      const r=await BA_API.request('employee_history_detail',{month});
      openModal(`<div class="title">ประวัติของฉัน ${month}</div><div class="list">${r.rows.map(x=>`<div class="item"><div class="row"><b>${esc(x.work_date)}</b><span class="badge">${esc(x.shift_name||'-')}</span></div><div>เข้า ${esc(x.first_in_time||'-')} · ออก ${esc(x.last_out_time||'-')} · สาย ${hm(x.late_minutes)} · เกิน ${hm(x.over_minutes)}</div><div>ทำงาน ${hm(x.credited_minutes)} · พัก ${hm(x.break_minutes)} · ขาด ${hm(x.short_minutes)}</div><div class="timeline">${x.events.map(e=>`<div>${esc(e.time)} — ${esc(e.label)}${e.office_name?' @ '+esc(e.office_name):''}</div>`).join('')||'<span class="muted">ไม่มีรายการกดเวลา</span>'}</div></div>`).join('')||'<div class="item">ไม่มีประวัติในเดือนนี้</div>'}</div>`);
    }catch(e){showModalError(e.message)}
  });
}
async function showMyProfile(){
  showLoadingModal('กำลังโหลดข้อมูลส่วนตัว');
  try{
    const r=await BA_API.request('employee_profile');
    const e=r.employee;
    openModal(`<div class="title">ข้อมูลส่วนตัว</div><div class="field"><label>รหัส</label><input value="${esc(e.employee_code)}" disabled></div><div class="field"><label>ชื่อ</label><input id="myName" value="${esc(e.display_name)}"></div><div class="field"><label>เบอร์โทร</label><input id="myPhone" value="${esc(e.phone||'')}"></div><div class="muted">ประเภท BA: ${esc(e.ba_mode||'-')} · สาขา: ${esc(e.office_name||'-')}</div><button class="primary full" style="margin-top:12px" onclick="saveMyProfile()">บันทึก</button>`);
  }catch(e){showModalError(e.message)}
}
async function saveMyProfile(){try{await BA_API.request('update_my_profile',{display_name:$('myName').value,phone:$('myPhone').value});closeModal();alert('บันทึกแล้ว');location.reload()}catch(e){alert(e.message)}}
function showMyShift(){
  showMonthPicker('Shift ทั้งเดือน','ดู Shift',async month=>{
    if(!month)return;
    showLoadingModal('กำลังโหลด Shift');
    try{
      const r=await BA_API.request('employee_shift_month',{month});
      openModal(`<div class="title">Shift ของฉัน ${month}</div><div class="day-grid">${r.rows.map(x=>`<div class="day ${x.status==='WORK'?'work':x.status==='OFF'?'off':'leave'}"><b>${Number(x.date.slice(-2))}</b><br>${esc(x.status==='WORK'?(x.shift_name||x.shift_id):x.status)}<br>${x.start_time?esc(x.start_time):''}</div>`).join('')}</div>`);
    }catch(e){showModalError(e.message)}
  });
}
async function showMyLeaves(){
  showLoadingModal('กำลังโหลดสถานะการลา');
  try{
    const r=await BA_API.request('my_leave_history');
    openModal(`<div class="title">สถานะการลา</div><div class="muted" style="margin-bottom:10px">ระบบจะแสดงรายการจนถึง 3 วันหลังวันลา</div><div class="list">${r.rows.map(x=>`<div class="item"><b>${esc(x.leave_date)} · ${esc(x.leave_type)}</b><div>สถานะ: ${esc(x.status)}</div><div>เหตุผลของฉัน: ${esc(x.reason||'-')}</div><div>เหตุผล/หมายเหตุ Supervisor: ${esc(x.reviewer_note||'-')}</div></div>`).join('')||'<div class="item">ไม่มีรายการลาที่อยู่ในช่วงแสดงผล</div>'}</div>`);
  }catch(e){showModalError(e.message)}
}
function showLeaveForm(){openModal(`<div class="title">ยื่นคำขอลา</div><div class="field"><label>วันที่</label><input id="lvDate" type="date"></div><div class="field"><label>ประเภท</label><select id="lvType"><option value="SICK_LEAVE">ลาป่วย</option><option value="BUSINESS_LEAVE">ลากิจ</option><option value="VACATION">ลาพักร้อน</option></select></div><div class="field"><label>เหตุผล</label><textarea id="lvReason"></textarea></div><button class="primary full" onclick="submitLeave()">ส่งคำขอ</button>`)}
async function submitLeave(){try{await BA_API.request('submit_leave',{leave_date:$('lvDate').value,leave_type:$('lvType').value,reason:$('lvReason').value});closeModal();alert('ส่งคำขอแล้ว')}catch(e){alert(e.message)}}
async function renderSupervisorHome(){const r=await BA_API.request('supervisor_dashboard_v2');$('supervisorView').classList.remove('hidden');$('supervisorView').innerHTML=`<div class="card"><div class="title">ภาพรวมทีมวันนี้</div><div class="kpis"><div class="kpi">เข้างานแล้ว<strong>${r.kpis.checked_in}</strong></div><div class="kpi">ออกงานแล้ว<strong>${r.kpis.checked_out}</strong></div><div class="kpi">กำลังทำงาน<strong>${r.kpis.working}</strong></div><div class="kpi">มาสาย<strong>${r.kpis.late}</strong></div><div class="kpi">ลา<strong>${r.kpis.leave}</strong></div><div class="kpi">ข้อมูลไม่ครบ<strong>${r.kpis.incomplete}</strong></div></div></div><div class="card"><div class="grid"><button onclick="showTeam()">ทีมของฉัน</button><button onclick="openSupervisorShift()">Shift รายคนทั้งเดือน</button><button onclick="showPendingLeaves()">อนุมัติการลา</button><button onclick="showDailyV2()">สรุปรายวัน</button><button onclick="showMonthlyV2()">สรุปรายเดือน</button></div></div>`}
async function showTeam(){const r=await BA_API.request('team_list');openModal(`<div class="title">ทีมของฉัน</div><div class="list">${r.rows.map(x=>`<div class="item"><b>${esc(x.employee_code)} · ${esc(x.display_name)}</b><div>${esc(x.phone||'-')} · ${esc(x.office_name||'-')} · Default ${esc(x.default_shift_id||'-')}</div><button onclick="editEmployee('${x.id}')">แก้ข้อมูล</button></div>`).join('')}</div>`)}
async function editEmployee(id){const r=await BA_API.request('team_employee',{employee_id:id});const e=r.employee;openModal(`<div class="title">แก้ข้อมูล ${esc(e.display_name)}</div><div class="field"><label>ชื่อ</label><input id="eName" value="${esc(e.display_name)}"></div><div class="field"><label>เบอร์โทร</label><input id="ePhone" value="${esc(e.phone||'')}"></div><div class="field"><label>ประเภท BA</label><select id="eMode">${['FIXED_BRANCH','MULTI_BRANCH','STOCK_REFILL'].map(v=>`<option ${v===e.ba_mode?'selected':''}>${v}</option>`).join('')}</select></div><div class="field"><label>สาขา</label><select id="eOffice">${r.offices.map(o=>`<option value="${o.id}" ${o.id===e.assigned_office_id?'selected':''}>${esc(o.office_name)}</option>`).join('')}</select></div><div class="field"><label>Default Shift</label><select id="eShift">${r.shifts.map(s=>`<option value="${s.id}" ${s.id===e.default_shift_id?'selected':''}>${esc(s.shift_name)}</option>`).join('')}</select></div><div class="field"><label>เหตุผล</label><textarea id="eReason"></textarea></div><button class="primary full" onclick="saveEmployee('${id}')">บันทึก</button>`)}
async function saveEmployee(id){try{await BA_API.request('update_team_employee',{employee_id:id,display_name:$('eName').value,phone:$('ePhone').value,ba_mode:$('eMode').value,assigned_office_id:$('eOffice').value,default_shift_id:$('eShift').value,reason:$('eReason').value});alert('บันทึกแล้ว');showTeam()}catch(e){alert(e.message)}}
async function openSupervisorShift(){const setup=await BA_API.request('shift_setup');openModal(`<div class="title">ดู/แก้ Shift รายคนทั้งเดือน</div><div class="field"><label>BA</label><select id="svEmp">${setup.employees.map(e=>`<option value="${e.id}">${esc(e.employee_code)} · ${esc(e.display_name)}</option>`).join('')}</select></div><div class="field"><label>เดือน</label><input id="svMonth" type="month" value="${thaiMonth()}"></div><button class="primary full" onclick="loadSupervisorShift()">เปิดตาราง</button>`)}
async function loadSupervisorShift(){const r=await BA_API.request('supervisor_employee_shift_month',{employee_id:$('svEmp').value,month:$('svMonth').value});shiftEditorData=r;selectedShiftDates.clear();renderSupervisorShiftEditor()}
function renderSupervisorShiftEditor(){const r=shiftEditorData;openModal(`<div class="title">${esc(r.employee.employee_code)} · ${esc(r.employee.display_name)}</div><div class="muted">Default Shift: ${esc(r.employee.default_shift_id||'-')} · คลิกเลือกหลายวัน</div><div class="day-grid" style="margin:10px 0">${r.rows.map(x=>`<div class="day ${x.schedule_status==='OFF'?'off':'work'} ${selectedShiftDates.has(x.date)?'selected':''}" onclick="toggleShiftDate('${x.date}')"><b>${Number(x.date.slice(-2))}</b><br>${esc(x.schedule_status==='OFF'?'OFF':(x.shift_id||'-'))}${x.is_default?'<br><span class="muted">Default</span>':''}</div>`).join('')}</div><div class="field"><label>สถานะ</label><select id="bulkStatus" onchange="$('bulkShiftWrap').classList.toggle('hidden',this.value==='OFF')"><option value="WORK">WORK</option><option value="OFF">OFF</option></select></div><div class="field" id="bulkShiftWrap"><label>Shift</label><select id="bulkShift">${r.shifts.map(s=>`<option value="${s.id}">${esc(s.shift_name)}</option>`).join('')}</select></div><button class="primary full" onclick="saveSupervisorShiftBulk()">บันทึกวันที่เลือก (${selectedShiftDates.size})</button>`)}
function toggleShiftDate(d){selectedShiftDates.has(d)?selectedShiftDates.delete(d):selectedShiftDates.add(d);renderSupervisorShiftEditor()}
async function saveSupervisorShiftBulk(){if(!selectedShiftDates.size)return alert('กรุณาเลือกวันที่');const reason=prompt('เหตุผลการแก้ Shift หลายวัน');if(!reason)return;try{await BA_API.request('bulk_set_employee_shifts',{employee_id:shiftEditorData.employee.id,dates:[...selectedShiftDates],schedule_status:$('bulkStatus').value,shift_id:$('bulkStatus').value==='OFF'?null:$('bulkShift').value,reason});alert('บันทึกแล้ว');closeModal()}catch(e){alert(e.message)}}
async function showPendingLeaves(){const r=await BA_API.request('pending_leaves');openModal(`<div class="title">คำขอลารออนุมัติ</div><div class="list">${r.rows.map(x=>`<div class="item"><b>${esc(x.employee_name)} · ${esc(x.leave_date)}</b><div>${esc(x.leave_type)} — ${esc(x.reason)}</div><div class="grid"><button class="green" onclick="reviewLeave('${x.id}','APPROVED')">อนุมัติ</button><button class="red" onclick="reviewLeave('${x.id}','REJECTED')">ปฏิเสธ</button></div></div>`).join('')||'ไม่มีรายการรออนุมัติ'}</div>`)}
async function reviewLeave(id,status){const note=prompt('เหตุผล/หมายเหตุ Supervisor')||'';await BA_API.request('review_leave',{leave_id:id,status,reviewer_note:note});showPendingLeaves()}
async function showDailyV2(){const d=prompt('วันที่ YYYY-MM-DD',thaiDate());if(!d)return;const r=await BA_API.request('team_daily_v2',{date:d});openModal(`<div class="title">สรุปรายวัน ${d}</div><div class="list">${r.rows.map(x=>`<div class="item"><div class="row"><b>${esc(x.employee_code)} · ${esc(x.display_name)}</b><span class="badge">${esc(x.shift_name||'-')}</span></div><div>เข้า ${esc(x.first_in_time||'-')} · ออก ${esc(x.last_out_time||'-')} · สาย ${hm(x.late_minutes)} · เกิน ${hm(x.over_minutes)}</div><div>ทำงาน ${hm(x.credited_minutes)} · พัก ${hm(x.break_minutes)} · ขาด ${hm(x.short_minutes)} · เติมของ ${hm(x.refill_minutes)}</div><div class="timeline">${x.events.map(e=>`<div>${esc(e.time)} — ${esc(e.label)}${e.office_name?' @ '+esc(e.office_name):''}</div>`).join('')||'<span class="muted">ไม่มีรายการ</span>'}</div><button onclick="editTimeline('${x.employee_id}','${d}')">แก้ Attendance</button></div>`).join('')}</div>`)}
async function editTimeline(emp,date){const r=await BA_API.request('attendance_timeline',{employee_id:emp,date});openModal(`<div class="title">Attendance Timeline</div><div class="list">${r.events.map(e=>`<div class="item"><div class="row"><span>${esc(e.event_type)} · ${esc(e.time)} · ${esc(e.office_name||'-')}</span><span><button onclick="updateEvent('${e.id}','${emp}','${date}','${e.event_type}','${e.time}')">แก้</button> <button onclick="deleteEvent('${e.id}','${emp}','${date}')">ลบ</button></span></div></div>`).join('')}</div><button class="primary full" onclick="addEvent('${emp}','${date}')">เพิ่มรายการ</button>`)}
async function updateEvent(id,emp,date,type,time){const nt=prompt('Type',type),tm=prompt('เวลา HH:MM',time),reason=prompt('เหตุผล');if(nt&&tm&&reason){await BA_API.request('update_attendance',{event_id:id,date,time:tm,type:nt,reason});editTimeline(emp,date)}}
async function deleteEvent(id,emp,date){const reason=prompt('เหตุผลการลบ');if(reason){await BA_API.request('delete_attendance',{event_id:id,reason});editTimeline(emp,date)}}
function addEvent(emp,date){const type=prompt('Type'),time=prompt('เวลา HH:MM'),reason=prompt('เหตุผล');if(type&&time&&reason)BA_API.request('add_attendance',{employee_id:emp,date,time,type,reason}).then(()=>editTimeline(emp,date)).catch(e=>alert(e.message))}
async function showMonthlyV2(){const m=prompt('เดือน YYYY-MM',thaiMonth());if(!m)return;const r=await BA_API.request('team_monthly_v2',{month:m});openModal(`<div class="title">สรุปรายเดือน ${m}</div><div class="muted">วันที่ผ่านมาแล้ว ${r.elapsed_days}/${r.total_days} วัน</div><div class="list" style="margin-top:10px">${r.rows.map(x=>`<div class="item"><b>${esc(x.employee_code)} · ${esc(x.display_name)}</b><div>วันที่ผ่านมา/ทั้งเดือน ${x.elapsed_days}/${x.total_days} · ตารางงาน ${x.scheduled_elapsed}/${x.scheduled_month}</div><div>มาทำงานจริง ${x.actual_work_days} วัน · หยุด ${x.off_days} วัน · เกิน ${x.over_days} วัน · สาย ${x.late_days} วัน · ขาด ${x.short_days} วัน</div><div>สายรวม ${hm(x.late_minutes)} · เกินรวม ${hm(x.over_minutes)}</div><div>ลาป่วย ${x.sick_leave_days} · ลากิจ ${x.business_leave_days} · เติมของ ${x.refill_days} วัน (${hm(x.refill_minutes)}) · ลืมกดออก ${x.forgot_checkout_days} วัน</div></div>`).join('')}</div>`)}
window.addEventListener('load',init)
</script>
</body></html>
